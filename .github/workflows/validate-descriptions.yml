name: Validate Data Source Descriptions

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages("remotes")'
          Rscript -e 'remotes::install_github("oxford-pharmacoepi/dataSourceDescriptions")'

      - name: Validate JSON descriptions
        run: |
          Rscript -e '
            files <- list.files("descriptions", full.names = TRUE)
            failed_files <- character()
            for (file in files) {
              tryCatch({
                DataSourceDescriptions::importDataSourceDescription(path = file)
                message(sprintf("✅ Passed: %s", file))
              }, error = function(e) {
                message(sprintf("❌ Failed: %s\n   Error: %s", file, e$message))
                failed_files <<- c(failed_files, file)
              })
            }
            if (length(failed_files) > 0) {
              stop(sprintf("Validation failed for %d file(s). See logs above.", length(failed_files)), call. = FALSE)
            } else {
              message("🎉 All JSON descriptions are valid!")
            }
          '
